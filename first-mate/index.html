document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

border: 1px solid rgba(201,146,62,.22);\n    box-shadow:\n      0 30px 80px -30px rgba(0,0,0,.85),\n      inset 0 0 0 1px rgba(232,221,201,.05);\n    overflow:hidden; isolation:isolate; user-select:none;\n    background: #0B0807;\n  }\n\n  .frame{ position:absolute; inset:0; opacity:0; pointer-events:none;\n    transition: opacity 900ms cubic-bezier(.4,0,.2,1); }\n  .frame.is-active{ opacity:1; pointer-events:auto; }\n  .frame svg{ width:100%; height:100%; display:block; }\n\n  /* CRT framing */\n  .crt-vignette{ position:absolute; inset:0; pointer-events:none; z-index:40; border-radius: inherit;\n    box-shadow: inset 0 0 140px 30px rgba(0,0,0,.45), inset 0 0 320px 80px rgba(0,0,0,.25); }\n  .crt-scan{ position:absolute; inset:0; pointer-events:none; z-index:41;\n    background: repeating-linear-gradient(to bottom, rgba(255,255,255,.018) 0, rgba(255,255,255,.018) 1px, transparent 1px, transparent 3px);\n    mix-blend-mode: overlay; opacity:.4; }\n  .crt-edge{ position:absolute; inset:0; pointer-events:none; z-index:42; border-radius: inherit;\n    box-shadow: inset 0 0 0 1.5px rgba(232,221,201,.06); }\n\n  .eyebrow{\n    position:absolute; top:24px; left:28px; z-index:30;\n    font-family:\"IBM Plex Mono\",monospace; font-size:11px; letter-spacing:.32em; text-transform:uppercase;\n    color: var(--ember);\n  }\n  .eyebrow .num{ color: var(--ember); }\n  .eyebrow .sep{ color: var(--cream-dim); margin: 0 10px; opacity:.55; }\n  .eyebrow .name{ color: var(--bone); }\n\n  .caption{\n    position:absolute; left:24px; right:24px; bottom:24px; z-index:30;\n    background: linear-gradient(180deg, rgba(7,5,4,.0), rgba(7,5,4,.55) 30%, rgba(7,5,4,.78));\n    padding: 38px 22px 18px; border-radius: 4px;\n  }\n  .caption p{\n    margin: 0; font-family:\"Inter Tight\", sans-serif; font-weight: 500;\n    font-size: clamp(15px, 1.35vw, 19px); line-height: 1.45; color: var(--bone);\n    letter-spacing:.005em; text-wrap: pretty; max-width: 80ch;\n  }\n\n  /* Subtle figure animations */\n  @keyframes bob {\n    0%,100%{ transform: translateY(0); }\n    50%   { transform: translateY(-3px); }\n  }\n  @keyframes leanBob {\n    0%,100%{ transform: translate(0,0) rotate(0deg); }\n    50%   { transform: translate(0,-2px) rotate(.4deg); }\n  }\n  @keyframes markerTick {\n    0%,100%{ transform: rotate(0deg); }\n    50%   { transform: rotate(2deg); }\n  }\n  @keyframes penTap {\n    0%,100%{ transform: translate(0,0); }\n    50%   { transform: translate(0,-1.5px); }\n  }\n  @keyframes briefPulse {\n    0%,100%{ opacity: 1; }\n    50%   { opacity: .82; }\n  }\n  @keyframes glowPulse {\n    0%,100%{ filter: drop-shadow(0 0 14px rgba(230,185,100,.55)); }\n    50%   { filter: drop-shadow(0 0 26px rgba(230,185,100,.85)); }\n  }\n  /* Beat 1: brief materializes, speech bubble pops in */\n  @keyframes briefMaterialize {\n    0%   { opacity: 0; transform: translateY(8px) scale(.96); }\n    60%  { opacity: 1; transform: translateY(0)   scale(1); }\n    100% { opacity: 1; transform: translateY(0)   scale(1); }\n  }\n  @keyframes bubblePop {\n    0%   { opacity: 0; transform: translate(-6px, 6px) scale(.6); }\n    100% { opacity: 1; transform: translate(0, 0) scale(1); }\n  }\n  @keyframes bubbleDots {\n    0%, 20%   { opacity: .3; }\n    50%       { opacity: 1; }\n    80%, 100% { opacity: .3; }\n  }\n  /* Beat 3: dissent dots pulse */\n  @keyframes dissentPulse {\n    0%, 100% { opacity: .9; transform: scale(1); }\n    50%      { opacity: 1; transform: scale(1.18); }\n  }\n  @keyframes dissentRing {\n    0%, 100% { opacity: .35; transform: scale(1); }\n    50%      { opacity: .7;  transform: scale(1.35); }\n  }\n  @keyframes annotateSwipe {\n    0%, 100% { transform: translate(0, 0) rotate(0deg); }\n    50%      { transform: translate(-10px, 2px) rotate(-3deg); }\n  }\n  /* Beat 4: decision stamp + caption settle + figures lean back */\n  @keyframes stampIn {\n    0%   { opacity: 0; transform: scale(.85) rotate(-6deg); filter: drop-shadow(0 0 0 rgba(230,185,100,0)); }\n    60%  { opacity: 1; transform: scale(1.06) rotate(-6deg); filter: drop-shadow(0 0 30px rgba(230,185,100,.9)); }\n    100% { opacity: 1; transform: scale(1) rotate(-6deg); filter: drop-shadow(0 0 16px rgba(230,185,100,.7)); }\n  }\n  @keyframes captainGlowUp {\n    0%   { filter: drop-shadow(0 0 14px rgba(230,185,100,.55)); }\n    100% { filter: drop-shadow(0 0 34px rgba(230,185,100,1)); }\n  }\n  @keyframes settleBack {\n    0%   { transform: translateY(0); }\n    100% { transform: translateY(2px); }\n  }\n\n  .frame.is-active .anim-brief-materialize { animation: briefMaterialize 1100ms cubic-bezier(.2,.7,.3,1) both; transform-origin: 50% 100%; }\n  .frame.is-active .anim-bubble-pop { animation: bubblePop 380ms cubic-bezier(.2,1.4,.3,1) 900ms both; transform-origin: 0% 100%; }\n  .frame.is-active .anim-bubble-dot-1 { animation: bubbleDots 1.4s ease-in-out 1300ms infinite; }\n  .frame.is-active .anim-bubble-dot-2 { animation: bubbleDots 1.4s ease-in-out 1450ms infinite; }\n  .frame.is-active .anim-bubble-dot-3 { animation: bubbleDots 1.4s ease-in-out 1600ms infinite; }\n  .frame.is-active .anim-dissent { animation: dissentPulse 1.4s ease-in-out infinite; transform-origin: 50% 50%; transform-box: fill-box; }\n  .frame.is-active .anim-dissent-ring { animation: dissentRing 1.4s ease-in-out infinite; transform-origin: 50% 50%; transform-box: fill-box; }\n  .frame.is-active .anim-annotate-swipe { animation: annotateSwipe 2.4s ease-in-out infinite; transform-origin: 100% 50%; }\n  .frame-4.is-active .anim-decision-stamp { animation: stampIn 700ms cubic-bezier(.2,1.2,.3,1) 1200ms both; transform-origin: 50% 50%; }\n  .frame-4.is-active .anim-captain-up { animation: captainGlowUp 1400ms ease-out 1200ms both; }\n  .frame-4.is-active .anim-settle { animation: settleBack 1400ms ease-out 1200ms both; }\n\n  .frame.is-active .anim-bob{ animation: bob 5.5s ease-in-out infinite; transform-origin: 50% 100%; }\n  .frame.is-active .anim-lean{ animation: leanBob 5.5s ease-in-out infinite; transform-origin: 50% 100%; }\n  .frame.is-active .anim-marker{ animation: markerTick 2.6s ease-in-out infinite; transform-origin: 100% 100%; }\n  .frame.is-active .anim-pen{ animation: penTap 1.8s ease-in-out infinite; }\n  .frame.is-active .anim-pulse{ animation: briefPulse 4.5s ease-in-out infinite; }\n  .frame.is-active .anim-glow{ animation: glowPulse 4s ease-in-out infinite; }\n\n  @media (prefers-reduced-motion: reduce){\n    .frame{ transition: opacity 0ms; }\n    .frame.is-active *{ animation: none !important; }\n  }\n\n  /* Beat indicators */\n  .indicators{\n    width:100%; display:flex; gap: 0; justify-content:space-between; padding: 4px 4px 0;\n  }\n  .ind{\n    flex: 1; display:flex; align-items:center; gap: 12px;\n    padding: 14px 18px; cursor: pointer; background: transparent;\n    border: none; border-top: 1px solid rgba(201,146,62,.16);\n    color: var(--cream-dim);\n    font-family:\"IBM Plex Mono\",monospace; font-size: 11px; letter-spacing: .26em; text-transform: uppercase;\n    transition: color 400ms ease, background 400ms ease, border-color 400ms ease;\n    text-align: left;\n  }\n  .ind .dot{\n    width: 7px; height: 7px; border-radius:50%; background: rgba(201,146,62,.4);\n    transition: background 400ms ease, box-shadow 400ms ease, transform 400ms ease;\n  }\n  .ind:hover{ color: var(--bone); }\n  .ind.active{ color: var(--bone); border-top-color: rgba(201,146,62,.65);\n    background: linear-gradient(180deg, rgba(201,146,62,.10), rgba(201,146,62,0)); }\n  .ind.active .dot{ background: var(--gold-hi); box-shadow: 0 0 12px rgba(230,185,100,.85); transform: scale(1.3); }\n  .ind .num{ color: var(--ember); }\n  .ind.active .num{ color: var(--gold-hi); }\n\n  .tagline{\n    width:100%; padding: 14px 6px 0; text-align:center;\n    font-family:\"Source Serif 4\", serif; font-weight:300; font-style:italic;\n    font-size: clamp(15px, 1.15vw, 18px); color: var(--cream-dim); letter-spacing:.01em;\n    transition: font-size 600ms cubic-bezier(.2,.7,.3,1);\n  }\n  .tagline .em{ color: var(--ember); font-style: normal;\n    transition: font-weight 600ms ease, font-size 600ms ease; }\n  .tagline .resolved{ color: var(--bone); font-style: normal; font-weight: 500;\n    display:inline-block; position:relative;\n    transition: font-weight 600ms ease, font-size 600ms cubic-bezier(.2,.7,.3,1), letter-spacing 600ms ease;\n  }\n  .tagline .resolved::after{\n    content:\"\"; position:absolute; left:0; right:0; bottom:-3px; height:2px;\n    background: linear-gradient(90deg, transparent, #E6B964, transparent);\n    box-shadow: 0 0 12px rgba(230,185,100,.85);\n    transform: scaleX(0); transform-origin: 50% 50%;\n    transition: transform 700ms cubic-bezier(.2,.7,.3,1) 200ms;\n  }\n  .tagline.is-resolved .resolved{\n    font-weight: 700; font-size: clamp(17px, 1.35vw, 21px); letter-spacing:.015em;\n  }\n  .tagline.is-resolved .resolved::after{ transform: scaleX(1); }\n\n  .no-js .frame-4{ opacity:1 !important; pointer-events:auto !important; }\n\n  @media (max-width: 720px){\n    .indicators{ flex-wrap: wrap; }\n    .ind{ flex: 1 1 50%; }\n    .caption{ left: 16px; right: 16px; bottom: 16px; padding: 28px 16px 14px; }\n    .eyebrow{ top: 18px; left: 20px; font-size: 10px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"no-js\">\n\n  <div class=\"container\">\n\n    <div class=\"stage\" id=\"stage\" role=\"region\" aria-label=\"The First Mate — sequential storyboard, four beats\">\n\n      <!-- ============================================================\n           BEAT 01 — CREATIVE\n           ============================================================ -->\n      <div class=\"frame frame-1 is-active\" data-beat=\"1\" aria-hidden=\"false\">\n        <svg viewBox=\"0 0 1600 900\" preserveAspectRatio=\"xMidYMid slice\" xmlns=\"http://www.w3.org/2000/svg\">\n          <defs>\n            <radialGradient id=\"b1-room\" cx=\"50%\" cy=\"40%\" r=\"80%\">\n              <stop offset=\"0%\" stop-color=\"#3A2518\"><\u002Fstop>\n              <stop offset=\"55%\" stop-color=\"#1F1410\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#0B0807\"><\u002Fstop>\n            <\u002FradialGradient>\n            <radialGradient id=\"b1-pendant\" cx=\"50%\" cy=\"0%\" r=\"60%\">\n              <stop offset=\"0%\" stop-color=\"#F4D38A\" stop-opacity=\".55\"><\u002Fstop>\n              <stop offset=\"55%\" stop-color=\"#C9923E\" stop-opacity=\".18\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#C9923E\" stop-opacity=\"0\"><\u002Fstop>\n            <\u002FradialGradient>\n            <linearGradient id=\"b1-window\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0%\" stop-color=\"#F4D38A\" stop-opacity=\".55\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#A8413A\" stop-opacity=\".22\"><\u002Fstop>\n            <\u002FlinearGradient>\n            <linearGradient id=\"b1-desk\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0%\" stop-color=\"#5A3A22\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#1F0F08\"><\u002Fstop>\n            <\u002FlinearGradient>\n            <radialGradient id=\"b1-brief-glow\" cx=\"50%\" cy=\"50%\" r=\"60%\">\n              <stop offset=\"0%\" stop-color=\"#F4D38A\" stop-opacity=\".7\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#C9923E\" stop-opacity=\"0\"><\u002Fstop>\n            <\u002FradialGradient>\n            <radialGradient id=\"b1-deskwash\" cx=\"50%\" cy=\"0%\" r=\"80%\">\n              <stop offset=\"0%\" stop-color=\"#E6B964\" stop-opacity=\".42\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#C9923E\" stop-opacity=\"0\"><\u002Fstop>\n            <\u002FradialGradient>\n          <\u002Fdefs>\n\n          <!-- Room -->\n          <rect width=\"1600\" height=\"900\" fill=\"url(#b1-room)\"><\u002Frect>\n\n          <!-- Window (warm light source on left) -->\n          <rect x=\"80\" y=\"120\" width=\"280\" =\"14\" fill=\"#C9923E\"><\u002Frect>\n              <rect x=\"-60\" y=\"-50\" width=\"100\" height=\"3\" fill=\"#3a2818\" opacity=\".55\"><\u002Frect>\n              <rect x=\"-60\" y=\"-38\" width=\"116\" height=\"3\" fill=\"#3a2818\" opacity=\".55\"><\u002Frect>\n              <rect x=\"-60\" y=\"-26\" width=\"92\" height=\"3\" fill=\"#3a2818\" opacity=\".55\"><\u002Frect>\n              <rect x=\"-60\" y=\"-8\" width=\"116\" height=\"3\" fill=\"#3a2818\" opacity=\".4\"><\u002Frect>\n              <rect x=\"-60\" y=\"4\" width=\"100\" height=\"3\" fill=\"#3a2818\" opacity=\".4\"><\u002Frect>\n              <rect x=\"-60\" y=\"16\" width=\"80\" height=\"3\" fill=\"#3a2818\" opacity=\".4\"><\u002Frect>\n              <rect x=\"-60\" y=\"42\" width=\"120\" height=\"3\" fill=\"#3a2818\" opacity=\".4\"><\u002Frect>\n              <rect x=\"-60\" y=\"54\" width=\"92\" height=\"3\" fill=\"#3a2818\" opacity=\".4\"><\u002Frect>\n              <!-- highlight stripe -->\n              <rect x=\"-60\" y=\"66\" width=\"100\" height=\"6\" fill=\"#C9923E\" opacity=\".5\"><\u002Frect>\n            <\u002Fg>\n          <\u002Fg>\n\n          <!-- Small map/data shape floating beside brief -->\n          <g transform=\"translate(1300 510)\">\n            <rect x=\"-60\" y=\"-44\" width=\"120\" height=\"88\" rx=\"2\" fill=\"#1F1410\" stroke=\"#C9923E\" stroke-opacity=\".55\" stroke-width=\"1.5\"><\u002Frect>\n            <path d=\"M -50 30 Q -30 -10 -10 0 Q 10 14 30 -8 Q 46 -20 50 -28\" stroke=\"#E6B964\" stroke-width=\"2\" fill=\"none\" opacity=\".9\"><\u002Fpath>\n            <circle cx=\"-30\" cy=\"-8\" r=\"3\" fill=\"#E6B964\"><\u002Fcircle>\n            <circle cx=\"10\" cy=\"6\" r=\"3\" fill=\"#D26B62\"><\u002Fcircle>\n            <circle cx=\"40\" cy=\"-22\" r=\"3\" fill=\"#E6B964\"><\u002Fcircle>\n          <\u002Fg>\n\n          <!-- Chair back behind exec -->\n          <path d=\"M 380 880 Q 380 580 540 580 Q 700 580 700 880 Z\" fill=\"#1A0F0B\" opacity=\".75\"><\u002Fpath>\n\n          <!-- ====== CREATIVE EXECUTIVE — seated, phone to ear ====== -->\n          <g class=\"anim-bob\">\n            <!-- Torso (cream blouse) - turned slightly -->\n            <path d=\"M 400 880 Q 400 580 540 555 Q 680 580 680 880 Z\" fill=\"#E8DDC9\" stroke=\"#C7B89E\" stroke-width=\"2\"><\u002Fpath>\n            <!-- Shirt highlight -->\n            <path d=\"M 540 555 Q 535 720 540 880\" stroke=\"#C7B89E\" stroke-width=\"2\" fill=\"none\" opacity=\".6\"><\u002Fpath>\n            <!-- Shoulder curve -->\n            <path d=\"M 420 600 Q 540 545 660 600\" stroke=\"#C7B89E\" stroke-width=\"2.5\" fill=\"none\" opacity=\".7\"><\u002Fpath>\n\n            <!-- Neck -->\n            <rect x=\"525\" y=\"500\" width=\"34\" height=\"60\" rx=\"11\" fill=\"#D4AB85\"><\u002Frect>\n\n            <!-- Head (slight tilt toward phone, viewer-right side) -->\n            <ellipse cx=\"546\" cy=\"464\" rx=\"56\" ry=\"62\" fill=\"#D4AB85\" stroke=\"#A88160\" stroke-width=\"1.5\"><\u002Fellipse>\n            <!-- Hair (long, dark, side-parted, falls toward back of neck) -->\n            <path d=\"M 488 458\n                     Q 488 392 546 388\n                     Q 604 392 604 458\n                     Q 608 488 600 510\n                     Q 590 500 584 492\n                     Q 572 504 558 506\n                     Q 540 508 524 500\n                     Q 510 506 500 514\n                     Q 484 488 488 458 Z\" fill=\"#3a2618\"><\u002Fpath>\n            <!-- Side hair locks -->\n            <path d=\"M 596 470 Q 612 510 600 540\" stroke=\"#3a2618\" stroke-width=\"6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M 496 472 Q 484 510 496 540\" stroke=\"#3a2618\" stroke-width=\"6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <!-- Ear (peeking) -->\n            <ellipse cx=\"600\" cy=\"466\" rx=\"6\" ry=\"9\" fill=\"#A88160\"><\u002Fellipse>\n\n            <!-- Face features (subtle, to suggest realism without cartoon) -->\n            <ellipse cx=\"528\" cy=\"466\" rx=\"3\" ry=\"2\" fill=\"#3a2818\"><\u002Fellipse>\n            <ellipse cx=\"558\" cy=\"468\" rx=\"3\" ry=\"2\" fill=\"#3a2818\"><\u002Fellipse>\n            <path d=\"M 542 488 Q 546 492 552 488\" stroke=\"#3a2818\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M 538 502 Q 546 506 554 502\" stroke=\"#3a2818\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n\n            <!-- LEFT arm raised — bent elbow, hand to ear holding phone -->\n            <!-- Upper arm: shoulder DOWN to elbow (forms the bend) -->\n            <path d=\"M 480 612 L 488 690\" stroke=\"#E8DDC9\" stroke-width=\"40\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath>\n            <path d=\"M 480 612 L 488 690\" stroke=\"#C7B89E\" stroke-width=\"40\" stroke-linecap=\"round\" fill=\"none\" opacity=\".25\"><\u002Fpath>\n            <!-- Elbow joint -->\n            <circle cx=\"488\" cy=\"688\" r=\"22\" fill=\"#E8DDC9\" stroke=\"#C7B89E\" stroke-width=\"1.5\"><\u002Fcircle>\n            <!-- Forearm: elbow UP to hand at ear -->\n            <path d=\"M 488 688 Q 520 580 588 502\" stroke=\"#E8DDC9\" stroke-width=\"36\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath>\n            <path d=\"M 488 688 Q 520 580 588 502\" stroke=\"#C7B89E\" stroke-width=\"36\" stroke-linecap=\"round\" fill=\"none\" opacity=\".25\"><\u002Fpath>\n            <!-- Hand at ear (curled around phone) -->\n            <ellipse cx=\"600\" cy=\"492\" rx=\"20\" ry=\"24\" fill=\"#D4AB85\" stroke=\"#A88160\" stroke-width=\"1.8\"><\u002Fellipse>\n            <!-- Thumb wrapping over phone -->\n            <path d=\"M 590 472 Q 596 466 608 470 Q 614 478 612 488\" fill=\"#D4AB85\" stroke=\"#A88160\" stroke-width=\"1.5\"><\u002Fpath>\n            <!-- Phone (held against ear, partly behind hand) -->\n            <rect x=\"600\" y=\"450\" width=\"22\" height=\"50\" rx=\"4\" fill=\"#1A1410\" stroke=\"#E6B964\" stroke-width=\"2\"><\u002Frect>\n            <rect x=\"604\" y=\"458\" width=\"14\" height=\"34\" rx=\"2\" fill=\"#E6B964\" opacity=\".9\"><\u002Frect>\n            <circle cx=\"611\" cy=\"496\" r=\"2\" fill=\"#E6B964\" opacity=\".7\"><\u002Fcircle>\n            <!-- Strong gold glow around phone (signal of active call) -->\n            <ellipse cx=\"611\" cy=\"475\" rx=\"22\" ry=\"32\" fill=\"none\" stroke=\"#E6B964\" stroke-opacity=\".55\" stroke-width=\"3\"><\u002Fellipse>\n            <ellipse cx=\"611\" cy=\"475\" rx=\"30\" ry=\"42\" fill=\"none\" stroke=\"#E6B964\" stroke-opacity=\".22\" stroke-width=\"2\"><\u002Fellipse>\n\n            <!-- RIGHT arm — hand resting on the brief -->\n            <path d=\"M 660 620 Q 760 670 920 660\" stroke=\"#E8DDC9\" stroke-width=\"34\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath>\n            <path d=\"M 660 620 Q 760 670 920 660\" stroke=\"#C7B89E\" stroke-width=\"34\" stroke-linecap=\"round\" fill=\"none\" opacity=\".25\"><\u002Fpath>\n            <ellipse cx=\"950\" cy=\"652\" rx=\"22\" ry=\"14\" fill=\"#D4AB85\" stroke=\"#A88160\" stroke-width=\"1.5\"><\u002Fellipse>\n          <\u002Fg>\n\n          <!-- Speech bubble — pops in after a beat to confirm she's on the call -->\n          <g class=\"anim-bubble-pop\">\n            <path d=\"M 660 380 Q 680 360 740 360 L 880 360 Q 920 360 920 400 L 920 440 Q 920 480 880 480 L 760 480 L 720 510 L 730 478 Q 660 472 660 440 Z\" fill=\"#F4EFE7\" stroke=\"#C9923E\" stroke-width=\"2.5\" opacity=\".96\"><\u002Fpath>\n            <circle cx=\"730\" cy=\"420\" r=\"6\" fill=\"#C9923E\" class=\"anim-bubble-dot-1\"><\u002Fcircle>\n            <circle cx=\"760\" cy=\"420\" r=\"6\" fill=\"#C9923E\" class=\"anim-bubble-dot-2\"><\u002Fcircle>\n            <circle cx=\"790\" cy=\"420\" r=\"6\" fill=\"#C9923E\" class=\"anim-bubble-dot-3\"><\u002Fcircle>\n            <rect x=\"820\" y=\"412\" width=\"60\" height=\"6\" rx=\"2\" fill=\"#C9923E\" opacity=\".55\"><\u002Frect>\n 62\" stroke=\"#3a2618\" stroke-width=\"6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n                <!-- Ear -->\n                <ellipse cx=\"862\" cy=\"488\" rx=\"6\" ry=\"9\" fill=\"#A88160\"><\u002Fellipse>\n                <!-- Eyes (focused, looking forward) -->\n                <ellipse cx=\"780\" cy=\"486\" rx=\"3.5\" ry=\"2.5\" fill=\"#2A1810\"><\u002Fellipse>\n                <ellipse cx=\"816\" cy=\"486\" rx=\"3.5\" ry=\"2.5\" fill=\"#2A1810\"><\u002Fellipse>\n                <!-- Brow -->\n                <path d=\"M 770 472 L 790 472\" stroke=\"#2A1810\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n                <path d=\"M 808 472 L 828 472\" stroke=\"#2A1810\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n                <!-- Nose -->\n                <path d=\"M 800 488 L 798 510 Q 800 514 804 510\" stroke=\"#2A1810\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n                <!-- Mouth (slightly parted — about to speak) -->\n                <ellipse cx=\"800\" cy=\"524\" rx=\"6\" ry=\"3\" fill=\"#2A1810\"><\u002Fellipse>\n              <\u002Fg>\n\n              <!-- LEFT arm forward on table -->\n              <path d=\"M 706 690 Q 740 700 800 706\" stroke=\"#A8413A\" stroke-width=\"40\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath>\n              <ellipse cx=\"800\" cy=\"708\" rx=\"22\" ry=\"14\" fill=\"#D4AB85\" stroke=\"#A88160\" stroke-width=\"1.5\"><\u002Fellipse>\n\n              <!-- RIGHT arm gesture — hand resting palm down on table -->\n              <path d=\"M 894 690 Q 860 706 820 712\" stroke=\"#A8413A\" stroke-width=\"40\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath>\n              <ellipse cx=\"816\" cy=\"714\" rx=\"22\" ry=\"14\" fill=\"#D4AB85\" stroke=\"#A88160\" stroke-width=\"1.5\"><\u002Fellipse>\n            <\u002Fg>\n          <\u002Fg>\n\n          <!-- partner 3 (right of captain) -->\n          <g class=\"anim-bob\" style=\"animation-delay:1.4s;\">\n            <path d=\"M 1060 880 Q 1060 700 1140 680 Q 1220 700 1220 880 Z\" fill=\"#2A2A2A\" stroke=\"#0F0F0F\" stroke-width=\"1.5\"><\u002Fpath>\n            <path d=\"M 1080 716 Q 1140 676 1200 716\" stroke=\"#0F0F0F\" stroke-width=\"2\" fill=\"none\" opacity=\".5\"><\u002Fpath>\n            <rect x=\"1126\" y=\"624\" width=\"28\" height=\"58\" rx=\"9\" fill=\"#B8896A\"><\u002Frect>\n            <ellipse cx=\"1140\" cy=\"596\" rx=\"44\" ry=\"48\" fill=\"#B8896A\" stroke=\"#896040\" stroke-width=\"1.5\"><\u002Fellipse>\n            <path d=\"M 1096 590 Q 1096 542 1140 538 Q 1184 542 1184 590 Q 1184 578 1170 570 Q 1140 566 1110 570 Q 1096 578 1096 590 Z\" fill=\"#2A1810\"><\u002Fpath>\n            <ellipse cx=\"1126\" cy=\"600\" rx=\"2.5\" ry=\"2\" fill=\"#2A1810\"><\u002Fellipse>\n            <ellipse cx=\"1154\" cy=\"600\" rx=\"2.5\" ry=\"2\" fill=\"#2A1810\"><\u002Fellipse>\n            <path d=\"M 1132 626 Q 1140 630 1148 626\" stroke=\"#2A1810\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <!-- Hand on table -->\n            <ellipse cx=\"1196\" cy=\"678\" rx=\"14\" ry=\"10\" fill=\"#B8896A\" stroke=\"#896040\" stroke-width=\"1\"><\u002Fellipse>\n          <\u002Fg>\n          <!-- partner 4 (far right, slight back) -->\n          <g class=\"anim-bob\" style=\"animation-delay:.7s;\">\n            <path d=\"M 1330 880 Q 1330 720 1400 700 Q 1470 720 1470 880 Z\" fill=\"#3A2C20\" stroke=\"#1F140C\" stroke-width=\"1.5\"><\u002Fpath>\n            <path d=\"M 1350 736 Q 1400 696 1450 736\" stroke=\"#1F140C\" stroke-width=\"2\" fill=\"none\" opacity=\".5\"><\u002Fpath>\n            <rect x=\"1386\" y=\"650\" width=\"28\" height=\"50\" rx=\"9\" fill=\"#A8896A\"><\u002Frect>\n            <ellipse cx=\"1400\" cy=\"624\" rx=\"42\" ry=\"46\" fill=\"#A8896A\" stroke=\"#7a5b3e\" stroke-width=\"1.5\"><\u002Fellipse>\n            <path d=\"M 1358 620 Q 1358 580 1400 576 Q 1442 580 1442 620 Q 1444 638 1438 654 Q 1428 644 1422 638 Q 1410 648 1400 648 Q 1390 648 1378 638 Q 1372 644 1362 654 Q 1356 638 1358 620 Z\" fill=\"#3A2618\"><\u002Fpath>\n            <ellipse cx=\"1386\" cy=\"628\" rx=\"2.5\" ry=\"2\" fill=\"#2A1810\"><\u002Fellipse>\n            <ellipse cx=\"1414\" cy=\"628\" rx=\"2.5\" ry=\"2\" fill=\"#2A1810\"><\u002Fellipse>\n            <path d=\"M 1392 654 Q 1400 658 1408 654\" stroke=\"#2A1810\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fg>\n          <\u002Fg>\n        <\u002Fsvg>\n\n        <div class=\"eyebrow\"><span class=\"num\">04<\u002Fspan><span class=\"sep\">·<\u002Fspan><span class=\"name\">The Decision<\u002Fspan><\u002Fdiv>\n        <div class=\"caption\"><p>Four functions. Context visible. The tension isn't resolved — it's visible. The captain leans forward. Makes the call.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CRT framing -->\n      <div class=\"crt-vignette\"><\u002Fdiv>\n      <div class=\"crt-scan\"><\u002Fdiv>\n      <div class=\"crt-edge\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"indicators\" role=\"tablist\">\n      <button class=\"ind active\" role=\"tab\" data-beat=\"1\" aria-selected=\"true\">\n        <span class=\"dot\"><\u002Fspan><span><span class=\"num\">01<\u002Fspan> · Creative<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"ind\" role=\"tab\" data-beat=\"2\" aria-selected=\"false\">\n        <span class=\"dot\"><\u002Fspan><span><span class=\"num\">02<\u002Fspan> · Engineering<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"ind\" role=\"tab\" data-beat=\"3\" aria-selected=\"false\">\n        <span class=\"dot\"><\u002Fspan><span><span class=\"num\">03<\u002Fspan> · Product<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"ind\" role=\"tab\" data-beat=\"4\" aria-selected=\"false\">\n        <span class=\"dot\"><\u002Fspan><span><span class=\"num\">04<\u002Fspan> · Decision<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"tagline\" id=\"tagline\">\n      <span class=\"em\">AI assembles context.<\u002Fspan> <span class=\"resolved\">Humans decide.<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <script>\n    (function(){\n      document.body.classList.remove('no-js');\n      var stage = document.getElementById('stage');\n      var frames = stage.querySelectorAll('.frame');\n      var inds = document.querySelectorAll('.ind');\n      var tagline = document.getElementById('tagline');\n      var current = 1;\n      var taglineTimer = null;\n      var autoplayTimer = null;\n      var BEAT_HOLD_MS = 5500;\n\n      function scheduleNext(){\n        if (autoplayTimer){ clearTimeout(autoplayTimer); }\n        autoplayTimer = setTimeout(function(){\n          var next = current >= frames.length ? 1 : current + 1;\n          setBeat(next);\n        }, BEAT_HOLD_MS);\n      }\n\n      function setBeat(n){\n        if (n < 1 || n > frames.length || n === current) {\n          scheduleNext();\n          return;\n        }\n        current = n;\n        frames.forEach(function(f){\n          var b = parseInt(f.getAttribute('data-beat'),10);\n          var active = (b === n);\n          f.classList.toggle('is-active', active);\n          f.setAttribute('aria-hidden', active ? 'false' : 'true');\n        });\n        inds.forEach(function(i){\n          var b = parseInt(i.getAttribute('data-beat'),10);\n          var active = (b === n);\n          i.classList.toggle('active', active);\n          i.setAttribute('aria-selected', active ? 'true' : 'false');\n        });\n\n        if (taglineTimer){ clearTimeout(taglineTimer); taglineTimer = null; }\n        if (n === 4){\n          taglineTimer = setTimeout(function(){\n            tagline.classList.add('is-resolved');\n          }, 2100);\n        } else {\n          tagline.classList.remove('is-resolved');\n        }\n\n        scheduleNext();\n      }\n\n      // Kick off autoplay on first visible beat\n      scheduleNext();\n\n      inds.forEach(function(i){\n        i.addEventListener('click', function(){\n          setBeat(parseInt(i.getAttribute('data-beat'),10));\n        });\n      });\n\n      stage.addEventListener('click', function(){\n        var next = current >= frames.length ? 1 : current + 1;\n        setBeat(next);\n      });\n\n      document.addEventListener('keydown', function(e){\n        if (e.key === 'ArrowRight'){ setBeat(current >= frames.length ? 1 : current + 1); }\n        else if (e.key === 'ArrowLeft'){ setBeat(current <= 1 ? frames.length : current - 1); }\n        else if (['1','2','3','4'].indexOf(e.key) > -1){ setBeat(parseInt(e.key,10)); }\n      });\n    })();\n  <\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
