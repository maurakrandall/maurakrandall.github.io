function PriorityDot({ score }) {
  const color = score >= 85 ? "#C45832" : score >= 70 ? "#D4940A" : "#7A7A7A";
  return <span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:color, flexShrink:0, marginTop:2 }} />;
}

function Card({ opp, gains, onStatusChange }) {

  const [stage, setStage] = useState("actions"); // actions | tune | draft
  const [tuneInput, setTuneInput] = useState("");
  const [doneUrl, setDoneUrl] = useState("");
  const ch = CHANNELS[opp.channel];
  const effective = Math.round(opp.base * (gains[opp.channel] / 100));
  const isPassed = opp.status === "passed";

  return (
    <div style={{
      background: isPassed ? "#F7F5F0" : "white",
      border: `1px solid ${expanded ? ch.color+"55" : "#E2DDD8"}`,
      borderLeft: `3px solid ${isPassed ? "#CCC" : ch.color}`,
      borderRadius: 8,
      marginBottom: 10,
      opacity: isPassed ? 0.5 : 1,
      transition: "all 0.2s ease",
      boxShadow: expanded ? `0 4px 20px ${ch.color}15` : "0 1px 4px rgba(0,0,0,0.05)",

      {/* COMPACT ROW */}
      <div

        style={{ padding:"13px 14px", cursor: isPassed ? "default" : "pointer", display:"flex", alignItems:"flex-start", gap:10 }}

        <div style={{ flex:1, minWidth:0 }}>

                <span style={{ fontSize:16, flexShrink:0 }}>💡</span>
                <div style={{ fontSize:12.5, color:"#555", lineHeight:1.6 }}>
                  <strong style={{ color:"#333" }}>Now make this more you.</strong> Read the draft, then tell me what feels off — too formal, too generic, missing your voice. The best pieces take a few rounds. I'll be here to help polish.
                </div>
              </div>

              {/* DRAFT ACTION ROW */}
              <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                <button style={{
                  fontFamily:"'JetBrains Mono',monospace", fontSize:10, padding:"6px 14px",
                  borderRadius:20, cursor:"pointer",
                  border:"1px solid #D4CFC8", background:"white", color:"#888",
                  letterSpacing:"0.05em"
                }}>
                  ↺ Not Me Yet
                </button>
                <button style={{
                  fontFamily:"'JetBrains Mono',monospace", fontSize:10, padding:"6px 14px",
                  borderRadius:20, cursor:"pointer",
                  border:"1px solid #D4CFC8", background:"white", color:"#888",
                  letterSpacing:"0.05em"
                }}>
                  Copy Draft
                </button>
                <div style={{ flex:1 }} />
                <button
                  onClick={() => onStatusChange(opp.id, "done")}
                  style={{
                    fontFamily:"'JetBrains Mono',monospace", fontSize:10, padding:"6px 16px",
                    borderRadius:20, cursor:"pointer",
                    border:"1px solid #2C7A5C", background:"#2C7A5C14", color:"#2C7A5C",
                    letterSpacing:"0.05em", fontWeight:600
                  }}>
                  Publish / Send ↗
                </button>
              </div>
            </div>
          )}

          {/* BOTTOM STATUS + PASS */}
          <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:16, paddingTop:12, borderTop:"1px solid #F0EDE8", flexWrap:"wrap" }}>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:"#CCC", textTransform:"uppercase", letterSpacing:"0.08em" }}>Status</span>
            {["new","in-progress","done"].map(s => (
              <button key={s} onClick={() => onStatusChange(opp.id, s)} style={{
                fontFamily:"'JetBrains Mono',monospace", fontSize:10, padding:"4px 11px",
                borderRadius:20, cursor:"pointer",
                border:`1px solid ${opp.status===s ? STATUS_COLORS[s] : "#D4CFC8"}`,
                background: opp.status===s ? STATUS_COLORS[s]+"15" : "white",
                color: opp.status===s ? STATUS_COLORS[s] : "#AAA",
                fontWeight: opp.status===s ? 600 : 400, transition:"all 0.15s ease"
              }}>{STATUS_LABELS[s]}</button>
            ))}
            {opp.status === "done" && (
              <input value={doneUrl} onChange={e=>setDoneUrl(e.target.value)}
                placeholder="Attach URL or Drive link..."
                style={{ flex:1, minWidth:160, fontFamily:"'JetBrains Mono',monospace", fontSize:11, padding:"5px 10px", borderRadius:6, border:"1px solid #D4CFC8", background:"#FAFAF8", color:"#333", outline:"none" }}
              />
            )}
            <div style={{ flex:1 }} />
            <button onClick={() => { onStatusChange(opp.id,"passed"); setExpanded(false); }} style={{
              fontFamily:"'JetBrains Mono',monospace", fontSize:10, padding:"4px 12px",
              borderRadius:20, cursor:"pointer",
              border:"1px solid #E2DDD8", background:"transparent", color:"#CCC",
              transition:"all 0.15s ease", letterSpacing:"0.04em"
            }}
            onMouseEnter={e=>{e.target.style.borderColor="#BBB";e.target.style.color="#999";}}
            onMouseLeave={e=>{e.target.style.borderColor="#E2DDD8";e.target.style.color="#CCC";}}>
              Pass on this
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function ChannelStrip({ id, gain, onChange }) {
  const ch = CHANNELS[id];
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:7, flex:1, padding:"0 10px", borderRight: id!=="engage"?"1px solid #2A2A2A":"none" }}>
      <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:"0.1em", textTransform:"uppercase", color: gain>50?ch.color:"#555", transition:"color 0.2s ease" }}>
        {ch.icon} {ch.label}
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:3, alignItems:"center", width:"100%" }}>
        {[100,75,50,25].map(m=>(
          <div key={m} style={{ width:"65%", height:1, background: gain>=m ? ch.color+"55":"#2E2E2E", transition:"background 0.2s" }} />
        ))}
      </div>
      <input type="range" min={0} max={100} value={gain} onChange={e=>onChange(parseInt(e.target.value))}
        style={{ writingMode:"vertical-lr", direction:"rtl", width:26, height:72, cursor:"pointer", accentColor:ch.color }} />
      <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:12, color: gain>50?ch.color:"#555", fontWeight:600, transition:"color 0.2s" }}>{gain}</div>
    </div>
  );
}

function Opportune() {
  const [gains, setGains] = useState({ content:75, roles:90, connect:60, engage:85 });
  const [opps, setOpps] = useState(SEED_DATA);
  const [tuningOpen, setTuningOpen] = useState(false);
  const [filter, setFilter] = useState("all");

  const updateGain = (ch,v) => setGains(g=>({...g,[ch]:v}));
  const updateStatus = (id,s) => setOpps(prev=>prev.map(o=>o.id===id?{...o,status:s}:o));

  const withEffective = useMemo(()=>
    opps.map(o=>({...o, effective: Math.round(o.base*(gains[o.channel]/100))}))
      .sort((a,b)=>b.effective-a.effective),
    [opps,gains]
  );

  const active = withEffective.filter(o=>o.status!=="passed"&&o.status!=="done");
  const top5 = active.slice(0,5);
  const passed = withEffective.filter(o=>o.status==="passed");
  const byChannel = ch => withEffective.filter(o=>o.channel===ch&&o.status!=="passed"&&o.status!=="done");
  const visibleChannels = filter==="all" ? Object.keys(CHANNELS) : [filter];

  return (
    <div style={{ fontFamily:"'DM Sans',sans-serif", background:"#F7F5F0", minHeight:"100vh", color:"#111" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        @keyframes fadeDown { from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)} }
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:#D4CFC8;border-radius:2px}
      `}</style>

      {/* HEADER */}
      <div style={{ background:"#1A1A1A", padding:"14px 22px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:"1px solid #2A2A2A" }}>
        <div>
          <div style={{ fontFamily:"'Instrument Serif',Georgia,serif", fontSize:22, color:"#F0ECE6", letterSpacing:"0.02em" }}>Opportune</div>
          <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:"#555", letterSpacing:"0.1em", textTransform:"uppercase", marginTop:1 }}>
            Your Opportunity Operating System
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          {passed.length > 0 && (
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9.5, color:"#555" }}>
              {passed.length} passed
            </span>
          )}
          <div style={{ textAlign:"right" }}>
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:"#444", textTransform:"uppercase", letterSpacing:"0.06em" }}>Last sync</div>
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:"#777" }}>Today, 9:14 AM</div>
          </div>
          <button onClick={()=>setTuningOpen(!tuningOpen)} style={{
            fontFamily:"'JetBrains Mono',monospace", fontSize:10, padding:"6px 14px", borderRadius:6, cursor:"pointer",
            border:"1px solid #444", background:tuningOpen?"#C45832":"#232323",
            color:tuningOpen?"white":"#888", letterSpacing:"0.06em", textTransform:"uppercase", transition:"all 0.2s"
          }}>
            {tuningOpen ? "▲ Tuning" : "⊟ Tuning"}
          </button>
        </div>
      </div>

      {/* TUNING PANEL */}
      {tuningOpen && (
        <div style={{ background:"#111", padding:"18px 22px 14px", borderBottom:"1px solid #2A2A2A", animation:"fadeDown 0.2s ease" }}>
          <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:"#444", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>
            Channel Gain — Tune Your Focus
          </div>
          <div style={{ display:"flex", gap:0, maxWidth:360 }}>
            {Object.keys(CHANNELS).map(id=>(
              <ChannelStrip key={id} id={id} gain={gains[id]} onChange={v=>updateGain(id,v)} />
            ))}
          </div>
          <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:"#3A3A3A", marginTop:10, letterSpacing:"0.05em" }}>
            Higher gain = more weight in Top Opportunes. Dial down channels you're not focused on right now.
          </div>
        </div>
      )}

      <div style={{ padding:"20px 22px", maxWidth:720, margin:"0 auto" }}>

        {/* TOP 5 */}
        <div style={{ marginBottom:28 }}>
          <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:12 }}>
            <div>
              <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9.5, color:"#C45832", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:3 }}>Top Opportunes Now</div>
              <div style={{ fontFamily:"'Instrument Serif',Georgia,serif", fontSize:20, color:"#111" }}>Your 5 highest-priority actions</div>
            </div>
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:"#AAA", textTransform:"uppercase", letterSpacing:"0.06em" }}>
              Cross-channel · AI ranked
            </div>
          </div>
          <div style={{ background:"white", border:"1px solid #E2DDD8", borderRadius:10, boxShadow:"0 2px 12px rgba(0,0,0,0.04)" }}>
            {top5.map((opp,i)=>{
              const ch=CHANNELS[opp.channel];
              return (
                <div key={opp.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"11px 14px", borderBottom:i<4?"1px solid #F5F2EE":"none" }}>
                  <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10.5, color:"#DDD", width:18, flexShrink:0 }}>
                    {String(i+1).padStart(2,"0")}
                  </span>
                  <div style={{ width:3, height:26, borderRadius:2, background:ch.color, flexShrink:0 }} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13.5, fontWeight:500, color:"#111", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{opp.title}</div>
                    <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9.5, color:"#AAA", marginTop:1 }}>{ch.icon} {ch.label} · {opp.source}</div>
                  </div>
                  <div style={{ display:"flex", gap:5, alignItems:"center", flexShrink:0 }}>
                    <PriorityDot score={opp.effective} />
                    <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9.5, color:opp.effective>=85?"#C45832":"#AAA" }}>{opp.effective}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* FILTER TABS */}
        <div style={{ display:"flex", gap:7, marginBottom:18, flexWrap:"wrap" }}>
          {["all",...Object.keys(CHANNELS)].map(f=>{
            const ch = f!=="all"?CHANNELS[f]:null;
            const isActive = filter===f;
            const activeColor = f==="all"?"#C45832":ch?.color;
            return (
              <button key={f} onClick={()=>setFilter(f)} style={{
                fontFamily:"'JetBrains Mono',monospace", fontSize:10, padding:"5px 13px", borderRadius:20, cursor:"pointer",
                border:`1px solid ${isActive?activeColor:"#D4CFC8"}`,
                background: isActive?activeColor+"12":"white",
                color: isActive?activeColor:"#999",
                transition:"all 0.15s ease", letterSpacing:"0.06em",
                textTransform: f==="all"?"uppercase":"capitalize"
              }}>
                {f==="all"?"All Channels":ch.icon+" "+ch.label}
                {f!=="all"&&<span style={{ marginLeft:5, opacity:0.5 }}>{gains[f]}</span>}
              </button>
            );
          })}
        </div>

        {/* CHANNEL SECTIONS */}
        {visibleChannels.map(ch=>{
          const cards = byChannel(ch);
          if(cards.length===0) return null;
          const channel = CHANNELS[ch];
          return (
            <div key={ch} style={{ marginBottom:26 }}>
              <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:11, paddingBottom:7, borderBottom:`1.5px solid ${channel.color}28` }}>
                <span style={{ fontSize:13, color:channel.color }}>{channel.icon}</span>
                <div style={{ fontFamily:"'Instrument Serif',Georgia,serif", fontSize:17, color:"#111" }}>{channel.label}</div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:channel.color, background:channel.color+"12", padding:"2px 8px", borderRadius:10 }}>
                  Gain {gains[ch]}
                </div>
                <div style={{ marginLeft:"auto", fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:"#CCC" }}>
                  {cards.length} active
                </div>
              </div>
              {cards.map(opp=>(
                <Card key={opp.id} opp={opp} gains={gains} onStatusChange={updateStatus} />
              ))}
            </div>
          );
        })}

        {/* PASSED PILE */}
        {passed.length > 0 && (
          <div style={{ marginBottom:24 }}>
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:"#CCC", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>
              Passed · {passed.length}
            </div>
            {passed.map(opp=>(
              <Card key={opp.id} opp={opp} gains={gains} onStatusChange={updateStatus} />
            ))}
          </div>
        )}

        <div style={{ textAlign:"center", padding:"20px 0", fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:"#CCC", letterSpacing:"0.07em", textTransform:"uppercase", borderTop:"1px solid #E2DDD8" }}>
          Opportune · Human decides. AI ranks. · concept prototype v0.1
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Opportune />);
</script>
</body>
</html>
